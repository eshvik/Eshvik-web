<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ESHVIK | User Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@300;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

<style>
:root {
  --gold: #f5b042;
  --dark-bg: #0a0a0a;
  --card-bg: rgba(255,255,255,0.05);
  --border: rgba(245,176,66,0.3);
}

body {
  background: var(--dark-bg);
  color: white;
  font-family: 'Inter', sans-serif;
  margin: 0;
  display: flex;
  height: 100vh;
}

/* Sidebar */
nav {
  width: 260px;
  background: rgba(0,0,0,0.9);
  border-right: 1px solid var(--border);
  padding: 2rem 1rem;
  display: flex;
  flex-direction: column;
}

.logo {
  font-family: 'Orbitron';
  color: var(--gold);
  font-size: 1.4rem;
  text-align: center;
  margin-bottom: 2rem;
}

nav a {
  color: #ccc;
  text-decoration: none;
  padding: 12px;
  margin: 6px 0;
  border-radius: 8px;
  display: flex;
  gap: 10px;
}

nav a:hover, nav a.active {
  background: var(--card-bg);
  color: var(--gold);
  border-left: 3px solid var(--gold);
}

/* Main */
main {
  flex: 1;
  padding: 2rem;
  overflow-y: auto;
}

.header {
  display: flex;
  justify-content: space-between;
}

/* Cards */
.stats-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit,minmax(200px,1fr));
  gap: 1rem;
  margin: 2rem 0;
}

.stat-card {
  background: var(--card-bg);
  border: 1px solid var(--border);
  padding: 1rem;
  border-radius: 16px;
}

.manager-card {
  background: #111;
  border: 1px solid var(--gold);
  padding: 2rem;
  border-radius: 20px;
  margin-top: 2rem;
}

.input-group {
  display: flex;
  gap: 10px;
  margin-top: 1rem;
}

input {
  flex: 1;
  padding: 10px;
  background: #222;
  border: 1px solid #444;
  color: white;
}

.btn {
  background: var(--gold);
  border: none;
  padding: 10px 20px;
  cursor: pointer;
  font-family: Orbitron;
}

/* Domain List */
.domain-list {
  margin-top: 20px;
}

.domain-item {
  background: #000;
  padding: 10px;
  margin: 5px 0;
  border-radius: 8px;
  display: flex;
  justify-content: space-between;
}

/* Footer */
.footer {
  text-align: center;
  margin-top: 30px;
  font-size: 12px;
  color: #888;
}
</style>
</head>

<body>

<nav>
  <div class="logo">⚡ ESHVIK WEB</div>
  <a class="active"><i class="fas fa-home"></i> Dashboard</a>
  <a><i class="fas fa-globe"></i> My Domains</a>
  <a><i class="fas fa-code"></i> HTML Editor</a>
  <a><i class="fas fa-shield-alt"></i> Security</a>
  <a style="margin-top:auto;"><i class="fas fa-sign-out-alt"></i> Logout</a>
</nav>

<main>

<div class="header">
  <h2>Welcome, Developer</h2>
  <div>user@eshvik.in</div>
</div>

<!-- Stats -->
<div class="stats-grid">
  <div class="stat-card"><h4>Active Sites</h4><p id="totalSites">0</p></div>
  <div class="stat-card"><h4>Status</h4><p style="color:#4CAF50;">Live</p></div>
</div>

<!-- Create Subdomain -->
<div class="manager-card">
  <h2>🚀 Create Subdomain</h2>

  <div class="input-group">
    <input id="domainInput" placeholder="your-name">
    <span style="align-self:center;color:gold;">.eshvik.in</span>
    <button class="btn" onclick="createDomain()">CREATE</button>
  </div>

  <small>Only lowercase letters, numbers allowed</small>

  <!-- Domain List -->
  <div class="domain-list" id="domainList"></div>
</div>

<div class="footer">
  ⚡ Powered by <b>ESHVIK</b> | web.eshvik.in
</div>

</main>

<script>
let domains = [];

/* CREATE DOMAIN */
function createDomain() {
  const input = document.getElementById("domainInput");
  const name = input.value.trim();

  if (!/^[a-z0-9-]+$/.test(name)) {
    alert("Invalid name!");
    return;
  }

  const full = name + ".eshvik.in";

  domains.push(full);
  input.value = "";

  renderDomains();
}

/* RENDER LIST */
function renderDomains() {
  const list = document.getElementById("domainList");
  list.innerHTML = "";

  domains.forEach((d, i) => {
    list.innerHTML += `
      <div class="domain-item">
        <span>${d}</span>
        <div>
          <button onclick="openSite('${d}')">Open</button>
          <button onclick="deleteDomain(${i})">Delete</button>
        </div>
      </div>
    `;
  });

  document.getElementById("totalSites").innerText = domains.length;
}

/* OPEN SITE */
function openSite(domain) {
  window.open("https://" + domain, "_blank");
}

/* DELETE */
function deleteDomain(index) {
  domains.splice(index, 1);
  renderDomains();
}
</script>

</body>
</html>
